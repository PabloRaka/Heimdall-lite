name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Syntax check
        run: python -m py_compile main.py modules/core/*.py modules/security/*.py modules/intel/*.py modules/infra/*.py scripts/*.py

      - name: Lint fatal errors
        run: flake8 main.py modules scripts tests --count --select=E9,F63,F7,F82 --show-source --statistics
