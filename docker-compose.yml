services:
  heimdall-lite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: heimdall-lite
    user: root
    privileged: true
    pid: host
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DASHBOARD_PORT: 8443
      HEIMDALL_HOST_DEFENSE: "1"
      HEIMDALL_HOST_ROOT: /host
      HEIMDALL_USE_NSENTER: "1"
      HEIMDALL_DISABLE_SUDO: "1"
      HEIMDALL_DRY_RUN: "0"
      SAFE_MODE: "false"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
      - ./logs:/app/logs
      - /:/host:rw
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
      - /run/systemd:/run/systemd
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
      - SYS_PTRACE
      - SYS_RESOURCE
      - DAC_READ_SEARCH
      - AUDIT_READ
      - AUDIT_CONTROL
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8443/api/dashboard", timeout=5).read()
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
